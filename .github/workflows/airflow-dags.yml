# GitHub Actions Workflow: Airflow DAG Validation
# This workflow validates all Airflow DAG files whenever code changes are pushed.
# It ensures DAGs are syntactically correct and can be parsed by Airflow scheduler.

name: Airflow DAG Validation

on:
  push:
    paths:
      - "dags/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Airflow (match Docker version)
        run: pip install "apache-airflow==2.9.0"

      - name: Validate DAGs
        run: |
          python -m py_compile dags/*.py
          airflow dags list
