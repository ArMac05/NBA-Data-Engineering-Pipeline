# ------------------------------------------------------------------------------
# Airflow + Postgres + dbt Orchestration Stack
#
# This docker-compose configuration sets up a local Airflow environment with:
#   - An init container to run database migrations and create the admin user
#   - Airflow webserver and scheduler services (v2.9.0)
#   - A Postgres 15 metadata database with health checks
#   - A dbt-runner container for executing dbt-duckdb transformations
#
# The stack mounts local directories for DAGs, logs, plugins, raw data
# (Bronze/Silver/Gold), and source code. This enables rapid development,
# reproducible ingestion, and a clean medallion architecture.
#
# Notes:
#   - init-airflow must complete successfully before webserver/scheduler start
#   - Postgres metadata is persisted via the `postgres_data` volume
#   - dbt-runner uses a custom Dockerfile (dbt-runner.Dockerfile)
#   - Airflow reads environment variables from `.env`
# ------------------------------------------------------------------------------

version: "3.9"

# UI for monitoring DAGs (Directed Acylic Graph)
services:
  # NOTE: init-airflow must run first before webserver and scheduler
  init-airflow:
    image: apache/airflow:2.9.0
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: >
      bash -c "airflow db migrate && airflow users create --username airflow --password airflow --firstname admin --lastname user --role Admin --email admin@example.com && echo 'Init complete.' && exit 0"

  airflow-webserver:
    image: apache/airflow:2.9.0
    environment:
      - _PIP_ADDITIONAL_REQUIREMENTS=duckdb
    command: webserver
    env_file: .env # Load environment variables from .env
    ports:
      - "8080:8080"
    depends_on:
      init-airflow:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./dags:/opt/airflow/dags # Where DAG python files live
      - ./logs:/opt/airflow/logs # Airflow task logs
      - ./plugins:/opt/airflow/plugins # Custom operators/hooks
      - ./data:/opt/airflow/data # Medallion layers (Bronze/Silver/Gold)
      - ./src:/opt/airflow/src # Maps src code nodules
      - ./dbt:/usr/app/dbt # Maps dbt project folder to dbt-runner container
      - /var/run/docker.sock:/var/run/docker.sock # Allows the container to communicate with the Docker Daemon

  # Runs Airflow scheduler process
  airflow-scheduler:
    image: apache/airflow:2.9.0
    environment:
      - _PIP_ADDITIONAL_REQUIREMENTS=duckdb
    command: scheduler
    env_file: .env
    depends_on:
      init-airflow:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./src:/opt/airflow/src
      - ./dbt:/usr/app/dbt
      - /var/run/docker.sock:/var/run/docker.sock

  # Runs Postgres15 database
  # Stores Airflow metadata (DAG runs, task states, logs, variables, connections)
  postgres:
    image: postgres:15
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # Runs DBT using the DuckDB adapter
  dbt-runner:
    build:
      context: .
      dockerfile: dbt-runner.Dockerfile
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ./dbt:/usr/app/dbt
      - ./data:/usr/app/data # Mounts /data so DBT can read/write Parquet files
      - ~/.dbt:/root/.dbt

    working_dir: /usr/app/dbt # dbt run works out of the box

# Persisted metadata
volumes:
  postgres_data:
